                - paragraph [ref=e381]:
                  - text: Fusion turns one prompt into a panel. The question goes to several models
                  - strong [ref=e382]: at the same time
                  - text: ", each answering independently — with web search and bash, and with no knowledge of the others. Then Opus 4.8 reads every answer, extracts the structure of the panel's reasoning (what they agree on, where they conflict, what only one saw, what they all missed), and writes a final answer grounded in that analysis."
                - paragraph [ref=e383]:
                  - text: The whole mechanism is
                  - strong [ref=e384]: independence, then synthesis
                  - text: ". The diversity that makes a panel beat a single model is harvested, not manufactured: running the same prompt independently yields different reasoning paths, tool calls, and sources — even two cold runs of the"
                  - emphasis [ref=e385]: same
                  - text: model diverge enough that synthesizing them beats running it once. So there are no assigned "lenses" or personas; every panelist gets the user's task verbatim and answers it straight. (See
                  - code [ref=e386]: references/panel.md
                  - text: .)
                - paragraph [ref=e387]:
                  - strong [ref=e388]: "One hard rule: Opus 4.8 always judges and writes the final answer — the pipeline can't be reversed."
                  - text: The panelist models can't call back out to spawn Opus, so Opus is always the driver. The slug reads driver-first for that reason.
